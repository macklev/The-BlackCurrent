<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile | BlackCurrent</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav id="nav"></nav>

    <main class="page-container">
        <h1>My Profile</h1>

        <section class="profile-card">
            <img id="profile-preview" src="" alt="Profile picture" class="profile-picture">

            <h2 id="profile-name"></h2>
            <p id="profile-handle"></p>
            <p id="profile-bio-display"></p>
        </section>

        <section class="profile-form-section">
            <h2>Edit Profile</h2>

            <form id="profile-form">
                <label for="profile-picture">Profile Picture URL</label>
                <input 
                    type="text" 
                    id="profile-picture" 
                    placeholder="Images/default_profile.png"
                >

                <label for="profile-bio">Bio</label>
                <textarea 
                    id="profile-bio" 
                    maxlength="255" 
                    placeholder="Write a short bio..."
                ></textarea>

                <button type="submit">Save Profile</button>
            </form>

            <p id="profile-message"></p>
        </section>
    </main>

    <footer>
        <h3>&copy; 2026 The BlackCurrent. All rights reserved.</h3>  
    </footer>

    <script type="module" src="scripts/main.js"></script>
    <script src="scripts/profile.js" defer></script>
</body>
</html>
